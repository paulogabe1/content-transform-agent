<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap');

  :root {
    --ink: #15191c;
    --panel: #1d2226;
    --panel-line: #2a3136;
    --paper: #e7e4dc;
    --muted: #838d93;
    --signal: #d9a441;
    --signal-dim: #6b5527;
    --alert: #c1654a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px 80px;
  }

  main {
    width: 100%;
    max-width: 760px;
  }

  header {
    margin-bottom: 36px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--signal);
    margin: 0 0 10px;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }

  header p {
    color: var(--muted);
    font-size: 14px;
    margin: 0;
    max-width: 54ch;
    line-height: 1.5;
  }

  /* Pipeline strip: the signature element */
  .pipeline {
    display: flex;
    align-items: center;
    gap: 0;
    margin: 32px 0;
    padding: 20px;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 6px;
  }

  .stage {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .stage-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--panel-line);
    border: 1px solid var(--muted);
    flex-shrink: 0;
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }

  .stage-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    transition: color 0.3s;
  }

  .stage-connector {
    flex: 0.6;
    height: 1px;
    background: var(--panel-line);
    margin: 0 4px;
  }

  .stage.active .stage-dot {
    background: var(--signal);
    border-color: var(--signal);
    box-shadow: 0 0 0 4px rgba(217, 164, 65, 0.15);
    animation: pulse 1.4s ease-in-out infinite;
  }

  .stage.active .stage-label { color: var(--paper); }

  .stage.done .stage-dot {
    background: var(--signal-dim);
    border-color: var(--signal);
  }

  .stage.done .stage-label { color: var(--signal); }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(217, 164, 65, 0.15); }
    50% { box-shadow: 0 0 0 7px rgba(217, 164, 65, 0.05); }
  }

  /* Input */
  /* Mode toggle */
  .mode-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }

  .mode-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--panel-line);
    padding: 8px 14px;
    border-radius: 5px;
    cursor: pointer;
  }

  .mode-btn.active {
    color: var(--signal);
    border-color: var(--signal);
  }

  #youtubeUrl {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 6px;
    color: var(--paper);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    padding: 14px 16px;
  }

  #youtubeUrl:focus {
    outline: none;
    border-color: var(--signal);
  }

  #youtubeUrl::placeholder { color: var(--muted); }

  textarea {
    width: 100%;
    min-height: 180px;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 6px;
    color: var(--paper);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 16px;
    resize: vertical;
  }

  textarea:focus {
    outline: none;
    border-color: var(--signal);
  }

  textarea::placeholder { color: var(--muted); }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    border-radius: 5px;
    padding: 11px 18px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity 0.15s;
  }

  button:focus-visible {
    outline: 2px solid var(--signal);
    outline-offset: 2px;
  }

  button:disabled { cursor: not-allowed; opacity: 0.5; }

  #generateBtn {
    background: var(--signal);
    color: var(--ink);
  }

  #generateBtn:hover:not(:disabled) { opacity: 0.9; }

  #sampleBtn {
    background: transparent;
    color: var(--muted);
    border-color: var(--panel-line);
  }

  #sampleBtn:hover:not(:disabled) { color: var(--paper); border-color: var(--muted); }

  .status-line {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    min-height: 16px;
  }

  /* Output */
  .output { margin-top: 32px; display: none; }
  .output.visible { display: block; }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--panel-line);
    margin-bottom: 20px;
  }

  .tab {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: none;
    padding: 10px 4px;
    margin-right: 20px;
    border-bottom: 2px solid transparent;
    border-radius: 0;
  }

  .tab.active {
    color: var(--signal);
    border-bottom-color: var(--signal);
  }

  .tab-panel {
    display: none;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.7;
    color: var(--paper);
  }

  .tab-panel.active { display: block; }

  .error-box {
    display: none;
    background: rgba(193, 101, 74, 0.1);
    border: 1px solid var(--alert);
    color: var(--alert);
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 13px;
    margin-top: 20px;
  }

  .error-box.visible { display: block; }
</style>
</head>
<body>
<main>
  <header>
    <p class="eyebrow">Analyst &rarr; Writer &rarr; Writer</p>
    <h1>Content Agent</h1>
    <p>Paste a technical source - a transcript, doc, draft, or a YouTube
       link - and the pipeline below extracts the strongest idea in it,
       then drafts a blog post and three social posts from that.</p>
  </header>

  <div class="pipeline" id="pipeline">
    <div class="stage" data-stage="analyst">
      <span class="stage-dot"></span>
      <span class="stage-label">Analyst Brief</span>
    </div>
    <div class="stage-connector"></div>
    <div class="stage" data-stage="blog">
      <span class="stage-dot"></span>
      <span class="stage-label">Blog Draft</span>
    </div>
    <div class="stage-connector"></div>
    <div class="stage" data-stage="social">
      <span class="stage-dot"></span>
      <span class="stage-label">Social Posts</span>
    </div>
  </div>

  <div class="mode-toggle" id="modeToggle">
    <button class="mode-btn active" data-mode="text" type="button">Paste text</button>
    <button class="mode-btn" data-mode="youtube" type="button">YouTube link</button>
  </div>

  <textarea id="sourceText" placeholder="Paste your source text here..."></textarea>
  <input type="url" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=..." style="display: none;">

  <div class="controls">
    <button id="generateBtn">Generate</button>
    <button id="sampleBtn" type="button">Load sample transcript</button>
  </div>
  <p class="status-line" id="statusLine"></p>

  <div class="error-box" id="errorBox"></div>

  <div class="output" id="output">
    <div class="tabs">
      <button class="tab active" data-tab="analyst">Analyst Brief</button>
      <button class="tab" data-tab="blog">Blog Draft</button>
      <button class="tab" data-tab="social">Social Posts</button>
    </div>
    <div class="tab-panel active" id="panel-analyst"></div>
    <div class="tab-panel" id="panel-blog"></div>
    <div class="tab-panel" id="panel-social"></div>
  </div>
</main>

<script>
  const generateBtn = document.getElementById('generateBtn');
  const sampleBtn = document.getElementById('sampleBtn');
  const sourceText = document.getElementById('sourceText');
  const youtubeUrl = document.getElementById('youtubeUrl');
  const modeToggle = document.getElementById('modeToggle');
  const statusLine = document.getElementById('statusLine');
  const errorBox = document.getElementById('errorBox');
  const output = document.getElementById('output');
  const pipeline = document.getElementById('pipeline');

  let currentMode = 'text';

  modeToggle.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentMode = btn.dataset.mode;
      modeToggle.querySelectorAll('.mode-btn').forEach(b =>
        b.classList.toggle('active', b === btn));
      sourceText.style.display = currentMode === 'text' ? 'block' : 'none';
      youtubeUrl.style.display = currentMode === 'youtube' ? 'block' : 'none';
      sampleBtn.style.display = currentMode === 'text' ? 'inline-block' : 'none';
      statusLine.textContent = '';
    });
  });

  const stages = ['analyst', 'blog', 'social'];
  const stageMessages = {
    analyst: 'Analyzing source material...',
    blog: 'Drafting the blog post...',
    social: 'Writing social posts...',
  };

  let statusInterval = null;
  let elapsedInterval = null;

  function setStageState(stage, state) {
    const el = pipeline.querySelector(`[data-stage="${stage}"]`);
    el.classList.remove('active', 'done');
    if (state) el.classList.add(state);
  }

  function resetPipeline() {
    stages.forEach(s => setStageState(s, null));
  }

  // There's no real per-stage progress from the API in one request.
  // This cycles through stage names as a sense of where things likely
  // are, not a literal live status. See README for why.
  function startProgressSimulation() {
    let i = 0;
    setStageState(stages[0], 'active');
    statusInterval = setInterval(() => {
      setStageState(stages[i], 'done');
      i = (i + 1) % stages.length;
      setStageState(stages[i], 'active');
    }, 12000);

    const start = Date.now();
    elapsedInterval = setInterval(() => {
      const secs = Math.floor((Date.now() - start) / 1000);
      statusLine.textContent = `${stageMessages[stages[i]]} (${secs}s)`;
    }, 500);
  }

  function stopProgressSimulation() {
    clearInterval(statusInterval);
    clearInterval(elapsedInterval);
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('.tab-panel').forEach(p =>
      p.classList.toggle('active', p.id === `panel-${name}`));
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
  });

  sampleBtn.addEventListener('click', async () => {
    sampleBtn.disabled = true;
    try {
      const res = await fetch('/sample');
      const data = await res.json();
      sourceText.value = data.source_text;
    } catch (e) {
      statusLine.textContent = 'Could not load sample - is the server running?';
    } finally {
      sampleBtn.disabled = false;
    }
  });

  generateBtn.addEventListener('click', async () => {
    let payload;
    if (currentMode === 'youtube') {
      const url = youtubeUrl.value.trim();
      if (!url) {
        statusLine.textContent = 'Paste a YouTube link first.';
        return;
      }
      payload = { youtube_url: url };
    } else {
      const text = sourceText.value.trim();
      if (!text) {
        statusLine.textContent = 'Paste some source text first.';
        return;
      }
      payload = { source_text: text };
    }

    generateBtn.disabled = true;
    sampleBtn.disabled = true;
    errorBox.classList.remove('visible');
    output.classList.remove('visible');
    resetPipeline();
    startProgressSimulation();

    try {
      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`Server returned ${res.status}: ${errText}`);
      }

      const data = await res.json();
      document.getElementById('panel-analyst').textContent = data.analyst_brief;
      document.getElementById('panel-blog').textContent = data.blog_draft;
      document.getElementById('panel-social').textContent = data.social_posts;

      stages.forEach(s => setStageState(s, 'done'));
      output.classList.add('visible');
      switchTab('analyst');
      statusLine.textContent = 'Done.';
    } catch (e) {
      errorBox.textContent = e.message;
      errorBox.classList.add('visible');
      statusLine.textContent = '';
    } finally {
      stopProgressSimulation();
      generateBtn.disabled = false;
      sampleBtn.disabled = false;
    }
  });
</script>
</body>
</html>
